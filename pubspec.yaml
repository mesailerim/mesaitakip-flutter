name: mesaitakip_flutter
description: MesaiTakip - Mesai ve maaş takip uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Supabase
  supabase_flutter: ^2.8.4

  # Local storage
  shared_preferences: ^2.3.3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # PDF & Export
  printing: ^5.14.2
  pdf: ^3.11.3

  # Encryption
  encrypt: ^5.0.3

  # Utilities
  intl: ^0.20.2
  http: ^1.2.2
  uuid: ^4.5.1

  # Charts
  fl_chart: ^0.70.2

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
